<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>母亲节快乐 · 致我最爱的妈妈</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        }

        body {
            background: linear-gradient(to bottom, #FFF9F9, #F8E8EE);
            min-height: 100vh;
            padding: 20px;
            color: #333;
            line-height: 1.8;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        .header {
            margin: 50px 0 20px;
        }
        .title {
            font-size: 32px;
            color: #D885A3;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .subtitle {
            font-size: 18px;
            color: #666;
        }

        .swiper-box {
            position: relative;
            width: 100%;
            max-width: 600px;
            margin: 30px auto;
            border-radius: 20px;
            box-shadow: 0 8px 25px rgba(216, 133, 163, 0.15);
            overflow: hidden;
        }
        .swiper-img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            display: block;
        }
        .img-desc {
            padding: 15px;
            background: rgba(255, 255, 255, 0.9);
            color: #D885A3;
            font-size: 16px;
        }
        .swiper-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.8);
            border: none;
            border-radius: 50%;
            font-size: 20px;
            color: #D885A3;
            cursor: pointer;
            z-index: 10;
        }
        .prev { left: 15px; }
        .next { right: 15px; }

        .blessing {
            margin: 60px 0;
            padding: 0 20px;
        }
        .blessing p {
            font-size: 18px;
            color: #555;
            margin-bottom: 20px;
            line-height: 2;
        }
        .blessing .highlight {
            color: #F5B895;
            font-weight: bold;
        }

        .footer {
            margin: 50px 0 30px;
            color: #999;
            font-size: 16px;
        }
        .footer span {
            color: #D885A3;
        }

        @media (max-width: 600px) {
            .title { font-size: 26px; }
            .swiper-img { height: 300px; }
            .blessing p { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="title">❤️ 母亲节快乐 · 致我最爱的妈妈 ❤️</h1>
            <p class="subtitle">谢谢你陪我长大，你永远是我的人间温柔</p>
        </div>

        <div class="swiper-box">
            <button class="swiper-btn prev" onclick="prevImg()">‹</button>
            <img id="swiperImg" class="swiper-img" alt="母亲照片">
            <p id="imgDesc" class="img-desc"></p>
            <button class="swiper-btn next" onclick="nextImg()">›</button>
        </div>

        <div class="blessing">
            <p>感谢你用一生的温柔与付出，守护我长大，包容我的所有小脾气。</p>
            <p>岁月从不败美人，愿我的妈妈<span class="highlight">平安健康、永远开心、岁月温柔以待</span>。</p>
            <p>你陪我蹒跚学步，我陪你夕阳漫步，余生漫漫，我会一直爱你。</p>
        </div>

        <div class="footer">
            <span>💐</span> 爱你的孩子：XXX · 2026年母亲节 <span>💐</span>
        </div>
    </div>

    <script>
        // ✅ 核心：加载 GitHub 仓库内的本地图片（同级文件）
        let photoList = [
            { url: "1.png", desc: "妈妈最美的模样" },
            { url: "2.png", desc: "陪我长大的你" },
            { url: "3.png", desc: "永远温柔的妈妈" }
        ];

        let currentIndex = 0;
        const imgDom = document.getElementById("swiperImg");
        const descDom = document.getElementById("imgDesc");

        window.onload = function(){
            showPhoto();
        };

        function showPhoto() {
            imgDom.src = photoList[currentIndex].url;
            descDom.innerText = photoList[currentIndex].desc;
        }

        function prevImg() {
            currentIndex = (currentIndex - 1 + photoList.length) % photoList.length;
            showPhoto();
        }

        function nextImg() {
            currentIndex = (currentIndex + 1) % photoList.length;
            showPhoto();
        }

        setInterval(nextImg, 3000);
    </script>
</body>
</html>
