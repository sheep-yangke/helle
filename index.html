<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>祝单坷钰19岁生日快乐！</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: "微软雅黑", sans-serif;
            text-align: center;
            padding: 20px;
            color: #fff;
            overflow: hidden;
        }
        .content-wrap {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        /* 初始标题放大、居中 */
        .title {
            font-size: 80px;
            color: #ffffff;
            font-weight: bold;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
            text-shadow: 0 0 20px rgba(79, 195, 247, 0.9);
        }
        .name {
            font-size: 70px;
            color: #4fc3f7;
            margin: 15px 0;
            text-shadow: 2px 2px 15px rgba(0, 0, 0, 0.8), 0 0 25px rgba(79, 195, 247, 0.7);
        }
        .age {
            font-size: 40px;
            color: #b3e5fc;
            margin: 10px 0;
        }

        /* 初始隐藏：祝福语、蛋糕、署名 */
        .wish, .cake, #signature {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease forwards;
        }
        /* 点击后显示动画 */
        .show {
            opacity: 1 !important;
            transform: translateY(0) !important;
        }

        .wish {
            font-size: 28px;
            color: #ffffff;
            margin: 15px 0;
            line-height: 1.6;
        }
        .cake {
            font-size: 60px;
            margin: 20px 0;
        }
        /* 署名样式 */
        #signature {
            font-size: 30px;
            color: #ffeb3b;
            font-weight: bold;
            text-shadow: 0 0 10px #ffeb3b;
            margin: 10px 0 20px 0;
            z-index: 15;
        }

        /* 按钮样式 */
        #fireworkBtn {
            margin-top: 40px;
            padding: 20px 50px;
            font-size: 26px;
            background: #4fc3f7;
            color: #0f2027;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 0 25px rgba(41, 182, 246, 0.8);
        }
        #fireworkBtn:hover {
            transform: scale(1.1);
            background: #81d4fa;
        }

        /* 烟花画布 */
        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }

        @keyframes bounce {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>
    <div class="content-wrap">
        <!-- 初始显示的放大标题 -->
        <div class="title">生日快乐 🎉</div>
        <div class="name">单坷钰</div>
        <div class="age">喜迎19岁！</div>

        <!-- 点击后才显示的内容 -->
        <div class="wish">祝我的大学兄弟</div>
        <div class="wish">岁岁常欢愉，年年皆胜意✨</div>
        <div class="wish">愿你永远热烈自由，前路坦荡，万事顺意！</div>
        <div class="cake">🎂</div>
        <div id="signature">from 许扬</div>

        <button id="fireworkBtn">绽放烟花</button>
    </div>

    <canvas id="canvas"></canvas>

    <!-- 背景音乐（最大音量） -->
    <audio id="birthdayMusic" loop>
        <source src="https://cdn.jsdelivr.net/gh/happybirthdaymusic/happybirthday.mp3" type="audio/mpeg">
    

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // 强化版烟花效果
        class Firework {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height;
                this.speed = 12;
                this.angle = Math.PI / 2 + (Math.random() - 0.5) * 1.2;
                this.dx = Math.cos(this.angle) * this.speed;
                this.dy = Math.sin(this.angle) * this.speed;
                this.alpha = 1;
                this.color = `hsl(${Math.random() * 360}, 100%, 65%)`;
                this.size = 5;
            }
            update() {
                this.x += this.dx;
                this.y -= this.dy;
                this.dy -= 0.15;
                this.alpha -= 0.008;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        let fireworks = [];
        let fireworkInterval;
        let isPlaying = false;
        const btn = document.getElementById('fireworkBtn');
        const music = document.getElementById('birthdayMusic');
        // 需要动画显示的元素
        const animateElements = document.querySelectorAll('.wish, .cake, #signature');

        // 点击按钮触发所有效果
        btn.addEventListener('click', () => {
            if(isPlaying) return;
            isPlaying = true;
            btn.style.display = 'none';
            
            // 播放音乐（最大音量）
            music.volume = 1;
            music.play().catch(e => console.log(e));

            // 依次触发祝福语/蛋糕/署名 动画弹出
            animateElements.forEach((el, index) => {
                setTimeout(() => {
                    el.classList.add('show');
                }, index * 200);
            });

            // 超密集炫酷烟花
            fireworkInterval = setInterval(() => {
                for(let i=0; i<3; i++){
                    fireworks.push(new Firework());
                }
            }, 100);

            // 8秒后停止烟花
            setTimeout(() => {
                clearInterval(fireworkInterval);
                setTimeout(() => {
                    isPlaying = false;
                }, 5000);
            }, 8000);
        });

        // 渲染烟花
        function render() {
            ctx.fillStyle = 'rgba(15, 32, 39, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            fireworks.forEach((fire, index) => {
                fire.update();
                fire.draw();
                if(fire.alpha <= 0) fireworks.splice(index, 1);
            });
            requestAnimationFrame(render);
        }
        render();

        // 窗口适配
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
