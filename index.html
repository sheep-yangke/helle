<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>祝单坷钰19岁生日快乐！</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: "微软雅黑", sans-serif;
            text-align: center;
            padding: 20px;
            color: #fff;
        }
        .content-wrap {
            position: relative;
            z-index: 10;
        }
        /* 1. 生日快乐文字放大 */
        .title {
            font-size: 70px;
            color: #ffffff;
            font-weight: bold;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
            text-shadow: 0 0 15px rgba(79, 195, 247, 0.8);
        }
        .name {
            font-size: 60px;
            color: #4fc3f7;
            margin: 15px 0;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.8), 0 0 20px rgba(79, 195, 247, 0.6);
        }
        .age {
            font-size: 36px;
            color: #b3e5fc;
            margin: 10px 0;
        }
        .wish {
            font-size: 28px;
            color: #ffffff;
            margin: 15px 0;
            line-height: 1.6;
        }
        .cake {
            font-size: 60px;
            margin: 20px 0;
        }
        /* 2. 署名缩小 + 移到蛋糕下方 */
        #signature {
            font-size: 30px;
            color: #ffeb3b;
            font-weight: bold;
            text-shadow: 0 0 10px #ffeb3b;
            margin: 10px 0 20px 0;
            z-index: 15;
            opacity: 0;
        }
        #fireworkBtn {
            margin-top: 10px;
            padding: 15px 40px;
            font-size: 22px;
            background: #4fc3f7;
            color: #0f2027;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 0 20px rgba(41, 182, 246, 0.5);
        }
        #fireworkBtn:hover {
            transform: scale(1.1);
            background: #81d4fa;
        }
        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }
        @keyframes bounce {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes showText {
            0% { opacity: 0; transform: scale(0.5); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="content-wrap">
        <div class="title">生日快乐 🎉</div>
        <div class="name">单坷钰</div>
        <div class="age">喜迎19岁！</div>
        <div class="wish">祝我的大学兄弟</div>
        <div class="wish">岁岁常欢愉，年年皆胜意✨</div>
        <div class="wish">愿你永远热烈自由，前路坦荡，万事顺意！</div>
        <div class="cake">🎂</div>
        <!-- 署名放在蛋糕下方 -->
        <div id="signature">from 许扬</div>
        <button id="fireworkBtn">绽放烟花</button>
    </div>

    <canvas id="canvas"></canvas>

    <!-- 3. 音乐音量调至最大 -->
    <audio id="birthdayMusic" loop volume="1">
        <source src="https://cdn.jsdelivr.net/gh/happybirthdaymusic/happybirthday.mp3" type="audio/mpeg">
    </audio>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        class Firework {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height;
                this.speed = 8;
                this.angle = Math.PI / 2 + (Math.random() - 0.5) * 1;
                this.dx = Math.cos(this.angle) * this.speed;
                this.dy = Math.sin(this.angle) * this.speed;
                this.alpha = 1;
                this.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
            }
            update() {
                this.x += this.dx;
                this.y -= this.dy;
                this.dy -= 0.1;
                this.alpha -= 0.01;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }
        }

        let fireworks = [];
        let fireworkInterval;
        let isPlaying = false;
        const signature = document.getElementById('signature');
        const btn = document.getElementById('fireworkBtn');
        const music = document.getElementById('birthdayMusic');

        btn.addEventListener('click', () => {
            if(isPlaying) return;
            isPlaying = true;
            btn.style.display = 'none';
            
            // 音量最大
            music.volume = 1;
            music.play().catch(e => console.log(e));

            fireworkInterval = setInterval(() => {
                fireworks.push(new Firework());
            }, 200);

            setTimeout(() => {
                clearInterval(fireworkInterval);
                signature.style.animation = 'showText 2s forwards';
                
                let miniFire = setInterval(() => {
                    fireworks.push(new Firework());
                }, 300);
                setTimeout(() => clearInterval(miniFire), 3000);

                setTimeout(() => {
                    isPlaying = false;
                }, 8000);
            }, 5000);
        });

        function render() {
            ctx.fillStyle = 'rgba(15, 32, 39, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            fireworks.forEach((fire, index) => {
                fire.update();
                fire.draw();
                if(fire.alpha <= 0) fireworks.splice(index, 1);
            });
            requestAnimationFrame(render);
        }
        render();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
