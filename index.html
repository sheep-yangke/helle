<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>祝单坷钰19岁生日快乐！</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: "微软雅黑", sans-serif;
            text-align: center;
            padding: 20px;
        }
        .title {
            font-size: 50px;
            color: #ff4081;
            font-weight: bold;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }
        .name {
            font-size: 60px;
            color: #d81b60;
            margin: 15px 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .age {
            font-size: 36px;
            color: #5c3a9e;
            margin: 10px 0;
        }
        .wish {
            font-size: 28px;
            color: #333;
            margin: 15px 0;
            line-height: 1.6;
        }
        .henan {
            font-size: 24px;
            color: #ff5722;
            margin-top: 10px;
            font-weight: bold;
        }
        /* 生日蛋糕动画 */
        .cake {
            width: 100px;
            height: 80px;
            background: #fff;
            border-radius: 10px;
            margin: 30px 0;
            position: relative;
        }
        .cake::before {
            content: "🎂";
            font-size: 60px;
            position: absolute;
            top: -30px;
            left: 20px;
            animation: rotate 3s linear infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="title">生日快乐 🎉</div>
    <div class="name">单坷钰</div>
    <div class="age">喜迎19岁！</div>
    <div class="wish">
        祝我的大学同窗<br>
        岁岁常欢愉，年年皆胜意✨
    </div>
    <div class="henan">河南小伙/姑娘 一路长虹，前程似锦！</div>
    <div class="cake"></div>
    <div class="wish">19岁，奔赴更好的未来！</div>
</body>
</html>
